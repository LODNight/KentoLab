<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KentoLab 2.0 - PoC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
  </style>
</head>
<body class="p-8">

  <div class="max-w-4xl mx-auto bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-800">
    <!-- Header -->
    <div class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <i class="fa-solid fa-flask text-indigo-500"></i>
        <span>KentoLab 2.0 <span class="text-slate-400 text-sm font-normal">| Core Engine Proof of Concept</span></span>
      </h1>
      <div id="algo-name" class="px-3 py-1 bg-indigo-500/20 text-indigo-400 rounded text-sm font-semibold">Đang tải...</div>
    </div>

    <!-- Visualizer Canvas -->
    <div class="p-8 h-64 flex flex-col items-center justify-center border-b border-slate-800 relative bg-slate-950/50">
      <div id="visualizer-container" class="flex items-end justify-center gap-4 h-full w-full">
        <!-- Rendered elements will appear here -->
      </div>
    </div>

    <!-- Explanation Area -->
    <div class="p-4 bg-slate-900 border-b border-slate-800">
      <div class="text-sm font-mono text-emerald-400 flex items-center gap-2">
        <i class="fa-solid fa-terminal"></i>
        <span id="step-desc">Khởi tạo môi trường mô phỏng...</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="p-6 flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-850">
      <div class="flex items-center gap-3">
        <button id="btn-prev" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition">
          <i class="fa-solid fa-backward-step"></i>
        </button>
        <button id="btn-play" class="w-12 h-12 rounded-full bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center transition shadow-lg shadow-indigo-600/20">
          <i class="fa-solid fa-play"></i>
        </button>
        <button id="btn-pause" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition">
          <i class="fa-solid fa-pause"></i>
        </button>
        <button id="btn-next" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition">
          <i class="fa-solid fa-forward-step"></i>
        </button>
      </div>

      <div class="flex items-center gap-3 w-full md:w-64">
        <i class="fa-solid fa-gauge-high text-slate-500 text-sm"></i>
        <input type="range" id="speed-slider" min="100" max="900" value="500" class="w-full accent-indigo-500">
      </div>
    </div>
  </div>

  <!-- Bật chế độ module để load ES6 -->
  <script type="module" src="src/main_poc.js"></script>
</body>
</html>
